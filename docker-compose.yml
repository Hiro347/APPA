version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: appa_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: appa_llm
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:z
    command: -m /models/appa-v1.0-model.Q4_K_M.gguf --host 0.0.0.0 --port 8080 -n 8192 -c 8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appa_backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - HF_MODEL_ID=${HF_MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
      - HF_API_TOKEN=${HF_API_TOKEN}
      - SEARCH_API_KEY=${SEARCH_API_KEY}
      - LOCAL_LLM_URL=http://llm:8080/v1
      - PROXY_URL=socks5h://tor:9050
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      qdrant:
        condition: service_started
      llm:
        condition: service_started
      tor:
        condition: service_started
      searxng:
        condition: service_started
    restart: always

  tor:
    image: dperson/torproxy
    container_name: appa_tor
    ports:
      - "9050:9050"
    restart: always

  searxng:
    build: ./searxng_custom
    container_name: appa_searxng
    ports:
      - "8081:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appa_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  db_data:       # Persistent volume for SQLite user profiles database
  qdrant_data:   # Persistent volume for Qdrant vector indices and embeddings
