version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: appa_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appa_backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - HF_MODEL_ID=${HF_MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
      - HF_API_TOKEN=${HF_API_TOKEN}
      - SEARCH_API_KEY=${SEARCH_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appa_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  db_data:       # Persistent volume for SQLite user profiles database
  qdrant_data:   # Persistent volume for Qdrant vector indices and embeddings
